services:
  db:
    image: postgres:16-alpine
    container_name: deviny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: DevinyDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    container_name: deviny_api
    depends_on:
      - db
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=DevinyDB;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data: