services:
  postgres:
    image: postgres:16-alpine
    container_name: deviny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: DevinyDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - deviny_pgdata:/var/lib/postgresql/data

volumes:
  deviny_pgdata:
