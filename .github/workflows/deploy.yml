name: Deploy to VPS using Docker

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/deviny

            echo "Pulling latest changes..."
            git pull origin master

            # Ensure nginx config supports WebSocket for SignalR
            echo "Updating nginx config for WebSocket support..."
            if [ -f "nginx/api.deviny.me.conf" ]; then
              cp nginx/api.deviny.me.conf /etc/nginx/sites-available/api.deviny.me
              ln -sf /etc/nginx/sites-available/api.deviny.me /etc/nginx/sites-enabled/api.deviny.me
              nginx -t && systemctl reload nginx && echo "Nginx updated."
            fi

            echo "Rebuilding containers..."
            docker compose -p deviny -f docker-compose.deviny.yml up -d --build --pull missing

            echo "Waiting for Postgres to be ready..."
            sleep 5

            echo "Ensuring Postgres password is correct..."
            docker exec deviny-postgres psql -U postgres -c "ALTER USER postgres PASSWORD 'postgres';" 2>/dev/null \
              || docker exec -e PGPASSWORD=postgres deviny-postgres psql -U postgres -c "SELECT 1;" 2>/dev/null \
              || (echo "Password reset failed, recreating DB volume..." && \
                  docker compose -p deviny -f docker-compose.deviny.yml down -v && \
                  docker compose -p deviny -f docker-compose.deviny.yml up -d --build)

            echo "Waiting for services to stabilize..."
            sleep 5

            echo "Restarting API to pick up DB connection..."
            docker restart deviny_api

            echo "Success!"