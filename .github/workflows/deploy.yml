name: Deploy to VPS using Docker

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/deviny

            echo "Pulling latest changes..."
            git pull origin master

            echo "Rebuilding containers..."
            docker compose -p deviny -f docker-compose.deviny.yml up -d --build --pull missing

            echo "Waiting for Postgres to be ready..."
            sleep 5

            echo "Ensuring Postgres password is correct..."
            docker exec deviny-postgres psql -U postgres -c "ALTER USER postgres PASSWORD 'postgres';" || true

            echo "Restarting API to pick up DB connection..."
            docker restart deviny_api

            echo "Success!"